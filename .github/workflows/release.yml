name: Create Release

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Title (defaults to tag)"
        required: false
        type: string
      summary:
        description: "Summary (appears above auto-generated notes)"
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  create-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Read version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $json = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $tag = "v$($json.packages[0].version)"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Package binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = "witcherscript-language-${{ steps.version.outputs.tag }}-windows-x64.zip"
          $stage = "stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/release/witcherscript-check.exe $stage/
          Copy-Item target/release/witcherscript-lsp.exe   $stage/
          Copy-Item target/release/wsformat.exe            $stage/
          Copy-Item README.md  $stage/
          Copy-Item LICENSE*   $stage/ -ErrorAction SilentlyContinue
          Compress-Archive -Path "$stage/*" -DestinationPath $zipPath -Force

      - name: Create Draft Release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Read inputs from env, never via inline GitHub expressions: PowerShell treats backtick
          # as its escape char, so interpolated summaries lose every backtick (and it is injection-prone).
          $releaseTitle = $env:RELEASE_TITLE
          if ([string]::IsNullOrWhiteSpace($releaseTitle)) { $releaseTitle = $env:RELEASE_TAG }

          $releaseArgs = @()
          if ($env:RELEASE_PRERELEASE -eq "true") { $releaseArgs += "--prerelease" }

          if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_SUMMARY)) {
            $env:RELEASE_SUMMARY | Out-File -FilePath "summary.md" -Encoding utf8
            $releaseArgs += "--notes-file", "summary.md"
          }

          gh release create $env:RELEASE_TAG `
            --title $releaseTitle `
            --draft `
            @releaseArgs `
            --generate-notes `
            "witcherscript-language-$($env:RELEASE_TAG)-windows-x64.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_TITLE: ${{ inputs.title }}
          RELEASE_SUMMARY: ${{ inputs.summary }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
