name: CI

on:
  push:
    branches: ["master"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets

      - uses: taiki-e/install-action@2a864fa5714510ad0573d2f22ecd17bce6156699 # nextest

      - name: Test
        run: cargo nextest run

  bench:
    name: Bench (iai-callgrind)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - uses: taiki-e/install-action@2a864fa5714510ad0573d2f22ecd17bce6156699 # iai-callgrind-runner
        with:
          tool: iai-callgrind-runner@0.14

      - name: Restore iai-callgrind baseline
        uses: actions/cache@v4
        with:
          path: target/iai
          key: iai-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            iai-${{ runner.os }}-

      - name: Run iai-callgrind benches
        env:
          IAI_CALLGRIND_REGRESSION: "ir=5.0"
        run: cargo bench --bench iai_lib
