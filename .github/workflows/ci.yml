name: CI

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets

      - uses: taiki-e/install-action@2a864fa5714510ad0573d2f22ecd17bce6156699 # nextest

      - name: Test
        run: cargo nextest run

  bench:
    name: Bench (iai-callgrind)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - uses: taiki-e/install-action@2a864fa5714510ad0573d2f22ecd17bce6156699 # iai-callgrind-runner
        with:
          tool: iai-callgrind-runner@0.14

      - name: Restore iai-callgrind baseline
        id: baseline
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: target/iai
          key: iai-${{ runner.os }}-master-${{ github.sha }}
          restore-keys: |
            iai-${{ runner.os }}-master-

      - name: Seed baseline from master
        if: |
          github.event_name == 'pull_request' &&
          steps.baseline.outputs.cache-matched-key == ''
        run: |
          echo "No baseline cache; running iai on master to seed the comparison."
          original=$(git rev-parse HEAD)
          git fetch --depth=1 origin master
          git -c advice.detachedHead=false checkout FETCH_HEAD
          cargo bench --bench iai_lib -- --save-baseline=master
          git -c advice.detachedHead=false checkout "$original"

      - name: Compare benches against master (advisory)
        if: github.event_name == 'pull_request'
        env:
          IAI_CALLGRIND_REGRESSION: "ir=5.0"
        run: |
          cargo bench --bench iai_lib -- --baseline=master && status=0 || status=$?
          # Exit 3 is iai-callgrind flagging a regression: advisory, stay green.
          # Any other non-zero means the benches failed to build or run.
          if [ "$status" -ne 0 ] && [ "$status" -ne 3 ]; then
            echo "::error::iai-callgrind failed to run (exit $status)"
            exit "$status"
          fi

      - name: Record master baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: cargo bench --bench iai_lib -- --save-baseline=master

      - name: Save iai-callgrind baseline (master only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: target/iai
          key: iai-${{ runner.os }}-master-${{ github.sha }}
