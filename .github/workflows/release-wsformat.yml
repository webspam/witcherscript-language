name: Release wsformat binary

# One-off backfill: v0.12.0 advertised wsformat but its zip omitted the binary.
# Builds wsformat from the v0.12.0 commit and publishes it as a standalone,
# non-latest release so the original release and its assets are never touched.
# Hard-coded to v0.12.0 on purpose; delete this workflow once the run succeeds.

on:
  workflow_dispatch:

env:
  SOURCE_SHA: 3a904bba5b254ec4a09afb2972dc030937bddb4b
  VERSION: 0.12.0

jobs:
  release-wsformat:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout v0.12.0 commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_SHA }}

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Build wsformat
        run: cargo build --release --bin wsformat

      - name: Package wsformat
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = "wsformat-$($env:VERSION)-windows-x64.zip"
          $stage = "stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/release/wsformat.exe $stage/
          Copy-Item README.md $stage/
          Copy-Item LICENSE*  $stage/ -ErrorAction SilentlyContinue
          Compress-Archive -Path "$stage/*" -DestinationPath $zipPath -Force

      - name: Create standalone wsformat release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # No backticks in notes: PowerShell treats backtick as its escape char.
          $notes = "Standalone wsformat CLI binary for the v$($env:VERSION) release, which shipped without it. The v$($env:VERSION) release and its assets are unchanged."
          $notes | Out-File -FilePath notes.md -Encoding utf8
          gh release create "wsformat-$($env:VERSION)" `
            --title "wsformat $($env:VERSION)" `
            --draft `
            --notes-file notes.md `
            --latest=false `
            "wsformat-$($env:VERSION)-windows-x64.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
